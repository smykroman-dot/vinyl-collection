{% extends "base.html" %}
{% load static %}
{% load crispy_forms_filters %}

{% block content %}

  <h1>{{ object|yesno:"Update,Create" }} Album</h1>

  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form|crispy }}

    <div class="d-flex gap-2 mt-3">

      <button type="submit" class="btn btn-primary">
        Save
      </button>

      <a href="{% url 'vinyl:artist-list' %}" class="btn btn-dark">
        Back
      </a>

    </div>
  </form>

{% endblock %}
