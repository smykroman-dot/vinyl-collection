{% extends "base.html" %}
{% load crispy_forms_filters %}

{% block content %}
<h1>{{ object|yesno:"Update,Create" }} Collection</h1>

{% if object %}
  <h3 style="margin-bottom: 15px;">
    {{ object.album.title }}
  </h3>
{% endif %}

<form method="post">
    {% csrf_token %}
    {{ form|crispy }}
  <div class="d-flex gap-2 mt-3">

    <button type="submit" class="btn btn-primary">
      Save
    </button>

    <a href="{% url 'vinyl:my-collection' %}" class="btn btn-dark">
      Back
    </a>

  </div>
</form>

{% endblock %}
